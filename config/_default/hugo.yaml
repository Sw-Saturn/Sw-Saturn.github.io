baseURL: "https://sw-saturn.dev/"
title: Sw-Saturn

defaultContentLanguage: en
hasCJKLanguage: true

# Hugo module: Toha theme + npm asset mounts
module:
  imports:
    - path: github.com/hugo-toha/toha/v4
  mounts:
    - source: static/files
      target: static/files
    - source: ./node_modules/flag-icons/flags
      target: static/flags
    - source: ./node_modules/@fontsource/mulish/files
      target: static/files
    - source: ./node_modules/katex/dist/fonts
      target: static/fonts

languages:
  en:
    languageCode: en
    languageName: English
    title: Sw-Saturn
    weight: 1

markup:
  goldmark:
    renderer:
      unsafe: true
  tableOfContents:
    startLevel: 2
    endLevel: 6
    ordered: false

outputs:
  home:
    - HTML
    - RSS
    - JSON

outputFormats:
  rss:
    baseName: rss

enableEmoji: true
enableRobotsTXT: true
summaryLength: 30
pagination:
  pagerSize: 10

sitemap:
  changefreq: monthly
  priority: 0.5
  filename: sitemap.xml
